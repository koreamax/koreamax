name: Generate Space Shooter SVG

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate space shooter SVG
        uses: czl9707/gh-space-shooter@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GH_PAT }}
          output_dir: output

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .
          git diff --cached --quiet || git commit -m "chore: update space shooter"
          git push
